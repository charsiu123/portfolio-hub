<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Preset Mall — Demo</title><style>body{margin:0;background:#15151b;color:#f6f0e7;font:16px Arial,sans-serif}main{max-width:1000px;margin:auto;padding:32px}h1{font:700 clamp(2rem,7vw,5rem)/.9 Georgia,serif}input,select,button{padding:12px;border:1px solid #8f7e62;background:#211f27;color:inherit}button{cursor:pointer;background:#c65b3d}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-top:24px}.card{padding:18px;border:1px solid #4c4552;background:#211f27}.tag{color:#d5bb73;font-size:12px}.hidden{display:none}dialog{max-width:520px;background:#f6f0e7;color:#15151b;border:0;padding:28px}dialog button{color:#fff}@media(max-width:400px){main{padding:18px}}</style></head><body><main><p class="tag">PRESET MALL · RECRUITER DEMO · MOCK CHECKOUT</p><h1>Find the next sound.</h1><p>This is a client-side product demo. No payments, uploads, or accounts are connected.</p><label>Search <input id="q" placeholder="title or creator"></label> <label>Genre <select id="g"><option value="">All</option><option>House</option><option>Ambient</option><option>Techno</option></select></label><section id="grid" class="grid"></section></main><dialog id="detail"><button onclick="detail.close()">Close</button><div id="body"></div></dialog><script>const items=[['Pulse Forms','Nora Drift','House','Warm drum-led motion'],['Sub Zero Club','Maki Signal','Techno','Cold warehouse pressure'],['Aura Stack','Yuto Layer','Ambient','Soft evolving texture'],['Neon Hook Kit','Nora Drift','House','Bright lead sketches'],['Warehouse Stabs','Maki Signal','Techno','Tight chord strikes'],['Drift Keys','Yuto Layer','Ambient','Slow piano haze']];const grid=document.querySelector('#grid'),q=document.querySelector('#q'),g=document.querySelector('#g'),detail=document.querySelector('#detail'),body=document.querySelector('#body');function draw(){grid.innerHTML='';items.filter(x=>(!g.value||x[2]==g.value)&&x.join(' ').toLowerCase().includes(q.value.toLowerCase())).forEach(x=>{let e=document.createElement('article');e.className='card';e.innerHTML=`<p class="tag">${x[2]} · ${x[1]}</p><h2>${x[0]}</h2><p>${x[3]}</p><button>View preset</button>`;e.querySelector('button').onclick=()=>{body.innerHTML=`<p class="tag">${x[2]} · ${x[1]}</p><h2>${x[0]}</h2><p>${x[3]}</p><p>Preview and checkout are intentionally simulated for this demo.</p><button onclick="this.textContent='Mock purchase recorded'">Mock purchase</button>`;detail.showModal()};grid.append(e)})}q.oninput=g.onchange=draw;draw()</script></body></html>
